# ===============================================================
# BETA-THING-AI: SECURE MCP INFRASTRUCTURE STACK (BETA/STG)
# ===============================================================
#
# Purpose:
# - Run an MCP server in a restricted Kubernetes namespace
# - Limit who can call it
# - Reduce runtime privilege
# - constrain egress
# - enable mesh identity and mTLS enforcement
# - improve auditability
#
# Notes:
# - This manifest assumes EKS + Istio sidecar injection
# - IRSA governs AWS API access for this workload's Kubernetes service account
# - Istio workload identity governs service-to-service trust inside the mesh
# - This does NOT by itself solve overbroad tool permissions or unsafe app logic
#
# ===============================================================

apiVersion: v1
kind: Namespace
metadata:
  name: mcp-staging
  labels:
    istio-injection: enabled
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
---
# ===============================================================
# 1. IDENTITY LAYER: Kubernetes Service Account + AWS IRSA
# ===============================================================
#
# What this does:
# - Binds this workload's AWS API access to one IAM role
# - Limits cloud-side permissions to the role policy
#
# What this does NOT do:
# - It does not replace workload-to-workload identity in the mesh
# - It does not prevent misuse of permissions that are already granted
#
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mcp-github-sa
  namespace: mcp-staging
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/mcp-staging-read-only
automountServiceAccountToken: true
---
# ===============================================================
# 2. NETWORK ENTRYPOINT: ClusterIP Service
# ===============================================================
#
# What this does:
# - Gives the MCP server a stable in-cluster address
# - Allows the mesh and internal callers to target the workload safely
#
apiVersion: v1
kind: Service
metadata:
  name: mcp-server-github
  namespace: mcp-staging
  labels:
    app: github-mcp
spec:
  selector:
    app: github-mcp
  ports:
    - name: http
      port: 8080
      targetPort: 8080
  type: ClusterIP
---
# ===============================================================
# 3. RUNTIME LAYER: Hardened Deployment
# ===============================================================
#
# What this does:
# - Runs the MCP server with reduced Linux privileges
# - Enables sidecar injection for mesh identity, policy, and mTLS
# - Uses a read-only root filesystem and drops capabilities
#
# Important:
# - Replace the image digest with your actual signed/pinned image
# - Add volumes only if the application truly needs writable paths
#
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-server-github
  namespace: mcp-staging
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: github-mcp
  template:
    metadata:
      labels:
        app: github-mcp
    spec:
      serviceAccountName: mcp-github-sa
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: mcp-server
          image: mcp/github-server@sha256:REPLACE_WITH_REAL_DIGEST
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /healthz
              port: 8080
            failureThreshold: 30
            periodSeconds: 5
---
# ===============================================================
# 4. MESH SECURITY BASELINE: Strict mTLS
# ===============================================================
#
# What this does:
# - Requires mesh mutual TLS for inbound and service-to-service communication
# - Prevents plaintext fallback for workloads in this namespace
#
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: default
  namespace: mcp-staging
spec:
  mtls:
    mode: STRICT
---
# ===============================================================
# 5. NETWORK ACCESS LAYER: Allow only the approved caller identity
# ===============================================================
#
# What this does:
# - Restricts who can invoke this MCP server
# - Allows only the mesh identity of the approved gateway workload
#
# Important:
# - The "principal" below is an Istio workload identity
# - This is NOT a caller-supplied header
# - This relies on mTLS identity established by the mesh
#
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: mcp-server-allow-gateway-only
  namespace: mcp-staging
spec:
  selector:
    matchLabels:
      app: github-mcp
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - cluster.local/ns/gateway-system/sa/ai-gateway
      to:
        - operation:
            methods:
              - POST
            paths:
              - /rpc
              - /sse
---
# ===============================================================
# 6. OPTIONAL KUBERNETES NETWORK POLICY
# ===============================================================
#
# What this does:
# - Adds Kubernetes-level traffic restrictions in addition to mesh controls
# - Useful as defense in depth
#
# Important:
# - Effectiveness depends on your CNI supporting NetworkPolicy enforcement
# - Namespace/pod labels used below should be adjusted to your real environment
#
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: mcp-server-ingress
  namespace: mcp-staging
spec:
  podSelector:
    matchLabels:
      app: github-mcp
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: gateway-system
          podSelector:
            matchLabels:
              app: ai-gateway
      ports:
        - protocol: TCP
          port: 8080
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: istio-system
    - to: []
      ports:
        - protocol: TCP
          port: 443
---
# ===============================================================
# 7. FILTER LAYER: Wasm JSON-RPC Tool Guard
# ===============================================================
#
# What this does:
# - Enforces a narrow allowlist for MCP-exposed tool operations
# - Reduces risk from broad tool discovery or accidental invocation
#
# Important:
# - This protects the API surface the proxy can observe
# - It does NOT replace application-side authorization or input validation
#
apiVersion: extensions.istio.io/v1alpha1
kind: WasmPlugin
metadata:
  name: mcp-tool-guard
  namespace: mcp-staging
spec:
  selector:
    matchLabels:
      app: github-mcp
  url: oci://ghcr.io/kosmos-ai/mcp-filter:v1
  pluginConfig:
    tool_allowlist:
      - list_repositories
      - get_issue
      - search_code
    block_list:
      - delete_repo
      - execute_shell
---
# ===============================================================
# 8. EGRESS LAYER: Explicit external dependency declaration
# ===============================================================
#
# What this does:
# - Declares GitHub API as an approved external destination in the mesh
# - Makes outbound intent explicit
#
# Important:
# - ServiceEntry alone does not guarantee "all other egress is blocked"
# - Actual enforcement depends on your mesh egress policy and routing design
#
apiVersion: networking.istio.io/v1alpha3
kind: ServiceEntry
metadata:
  name: github-api-egress
  namespace: mcp-staging
spec:
  hosts:
    - api.github.com
  location: MESH_EXTERNAL
  ports:
    - number: 443
      name: tls
      protocol: TLS
  resolution: DNS
---
# ===============================================================
# 9. EGRESS SCOPING: Sidecar outbound visibility reduction
# ===============================================================
#
# What this does:
# - Restricts the set of hosts this workload can see through the sidecar
# - Reduces accidental or unauthorized outbound reachability
#
# Important:
# - This is strong defense in depth, but validate behavior in your mesh version
# - Keep Istio control-plane reachability available
#
apiVersion: networking.istio.io/v1alpha3
kind: Sidecar
metadata:
  name: mcp-egress-lockdown
  namespace: mcp-staging
spec:
  workloadSelector:
    labels:
      app: github-mcp
  egress:
    - hosts:
        - "istio-system/*"
        - "./api.github.com"
---
# ===============================================================
# 10. TELEMETRY LAYER: MCP request audit logging
# ===============================================================
#
# What this does:
# - Captures access logs for relevant MCP traffic
# - Improves forensic visibility and compliance review
#
# Important:
# - Logs should be exported to a central SIEM or log platform
# - Consider logging deny events separately as well
#
apiVersion: telemetry.istio.io/v1alpha1
kind: Telemetry
metadata:
  name: mcp-audit
  namespace: mcp-staging
spec:
  accessLogging:
    - providers:
        - name: envoy
      filter:
        expression: request.method == "POST" && (request.path == "/rpc" || request.path == "/sse")
