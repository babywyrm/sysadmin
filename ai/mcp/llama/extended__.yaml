## statefulset.yaml

```yaml
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ollama
  namespace: ai-ops
  labels:
    app.kubernetes.io/name: ollama
    app.kubernetes.io/version: "0.3.14"
    app.kubernetes.io/component: inference-server
    app.kubernetes.io/part-of: ai-ops-stack
    app.kubernetes.io/managed-by: kustomize
  annotations:
    # Triggers rolling restart on configmap change
    configmap.reloader.stakater.com/reload: "ollama-config"
spec:
  serviceName: ollama-headless
  replicas: 1
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      partition: 0
  persistentVolumeClaimRetentionPolicy:
    whenDeleted: Retain     # Never lose models on delete
    whenScaled: Retain
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
        app.kubernetes.io/name: ollama
        version: "0.3.14"
        role: inference-server
      annotations:
        # Force pod restart when configmap changes
        # (used by Reloader or manual rollout)
        checksum/config: "{{ include (print $.Template.BasePath '/configmap.yaml') . | sha256sum }}"
        # Prometheus scrape config
        prometheus.io/scrape: "true"
        prometheus.io/port: "11434"
        prometheus.io/path: "/metrics"
    spec:
      # в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      # SECURITY CONTEXT (Pod Level)
      # в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault      # Blocks ~300 unused syscalls
        # Prevent privilege escalation via suid binaries
        supplementalGroups: []

      serviceAccountName: ollama-sa
      automountServiceAccountToken: false

      # в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      # SCHEDULING
      # в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      terminationGracePeriodSeconds: 120   # Allow model unload
      priorityClassName: system-cluster-critical

      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: ollama

      # в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      # INIT CONTAINER вЂ” set ownership on volume
      # в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      initContainers:
        - name: volume-permissions
          image: busybox:1.36.1
          imagePullPolicy: IfNotPresent
          command: ["sh", "-c", "chown -R 1000:1000 /models"]
          securityContext:
            runAsUser: 0             # Needs root to chown
            runAsNonRoot: false
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
              add: ["CHOWN", "DAC_OVERRIDE"]
          volumeMounts:
            - name: model-storage
              mountPath: /models

      # в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      # MAIN CONTAINER
      # в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      containers:
        - name: ollama
          # Pin to digest вЂ” never use :latest in production
          image: ollama/ollama:0.3.14
          imagePullPolicy: IfNotPresent

          ports:
            - name: api
              containerPort: 11434
              protocol: TCP

          # в”Ђв”Ђ Environment from ConfigMap в”Ђв”Ђ
          envFrom:
            - configMapRef:
                name: ollama-config

          # в”Ђв”Ђ Individual env overrides в”Ђв”Ђ
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP

          # в”Ђв”Ђ Security Context (Container Level) в”Ђв”Ђ
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault

          # в”Ђв”Ђ Resources в”Ђв”Ђ
          resources:
            requests:
              memory: "2Gi"
              cpu: "1000m"
              ephemeral-storage: "512Mi"
            limits:
              memory: "6Gi"        # Increased: headroom for 7B models
              cpu: "4000m"
              ephemeral-storage: "1Gi"

          # в”Ђв”Ђ Probes в”Ђв”Ђ
          startupProbe:
            httpGet:
              path: /api/version
              port: api
            failureThreshold: 30   # 30 Г— 10s = 5 min to start
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /api/version
              port: api
            initialDelaySeconds: 0   # startupProbe guards this
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1

          readinessProbe:
            httpGet:
              path: /api/tags       # Returns 200 only when model ready
              port: api
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1

          # в”Ђв”Ђ Volume Mounts в”Ђв”Ђ
          volumeMounts:
            - name: model-storage
              mountPath: /models
            - name: tmp-dir
              mountPath: /tmp
            - name: ollama-run-dir
              mountPath: /root/.ollama/run   # PID/socket files

      # в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      # VOLUMES
      # в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      volumes:
        # tmpfs for /tmp вЂ” never touches disk
        - name: tmp-dir
          emptyDir:
            medium: Memory
            sizeLimit: 256Mi
        # tmpfs for runtime artifacts
        - name: ollama-run-dir
          emptyDir:
            medium: Memory
            sizeLimit: 64Mi

  # в”Ђв”Ђ PVC Template (replaces hostPath) в”Ђв”Ђ
  volumeClaimTemplates:
    - metadata:
        name: model-storage
        labels:
          app.kubernetes.io/name: ollama
        annotations:
          # Prevent volume from being deleted on scale-down
          helm.sh/resource-policy: keep
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: "local-path"    # Change to your SC
        resources:
          requests:
            storage: 50Gi               # Enough for several 7B models
```

