## Key Changes from Original вЂ” Summary

| Area | Original | Hardened |
| :--- | :--- | :--- |
| **Image tag** | `latest` | Pinned `0.3.14` |
| **User** | root (implicit) | `runAsUser: 1000`, `runAsNonRoot: true` |
| **Filesystem** | Read/Write | `readOnlyRootFilesystem: true` + tmpfs |
| **Capabilities** | All (default) | `drop: ALL` |
| **Storage** | `hostPath` | PVC `volumeClaimTemplate` |
| **Service Account** | Default (auto-mounted) | Dedicated SA, `automount: false` |
| **Network** | Open | Default-deny + allowlist policies |
| **Probes** | Only liveness | Startup + Liveness + Readiness |
| **Seccomp** | None | `RuntimeDefault` |
| **RBAC** | None | Minimal Role + RoleBinding |
| **Observability** | None | ServiceMonitor + annotations |
| **Disruption** | None | PodDisruptionBudget |
| **Resource limits** | Fixed | LimitRange + namespace enforcement |
| **PSS** | None | `restricted` enforced on namespace |
