## service.yaml

```yaml
# Headless service for StatefulSet DNS
apiVersion: v1
kind: Service
metadata:
  name: ollama-headless
  namespace: ai-ops
  labels:
    app.kubernetes.io/name: ollama
    app.kubernetes.io/component: inference-server
spec:
  clusterIP: None
  selector:
    app: ollama
  ports:
    - name: api
      port: 11434
      targetPort: api
      protocol: TCP
---
# ClusterIP service for internal clients
apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: ai-ops
  labels:
    app.kubernetes.io/name: ollama
    app.kubernetes.io/component: inference-server
  annotations:
    # Prometheus ServiceMonitor discovery
    prometheus.io/scrape: "true"
    prometheus.io/port: "11434"
spec:
  type: ClusterIP
  selector:
    app: ollama
  ports:
    - name: api
      port: 11434
      targetPort: api
      protocol: TCP
  sessionAffinity: ClientIP     # Sticky sessions for model affinity
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800     # 3 hours
```

