## kustomization.yaml

```yaml
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ai-ops

resources:
  - namespace.yaml
  - rbac.yaml
  - network-policy.yaml
  - configmap.yaml
  - statefulset.yaml
  - service.yaml
  - poddisruptionbudget.yaml
  - limitrange.yaml
  - servicemonitor.yaml

# Pin all images by digest in production
images:
  - name: ollama/ollama
    newTag: "0.3.14"
  - name: busybox
    newTag: "1.36.1"

commonLabels:
  app.kubernetes.io/part-of: ai-ops-stack
  app.kubernetes.io/managed-by: kustomize

# Validate against PSS restricted profile
validators:
  - apiVersion: kustomize.config.k8s.io/v1alpha1
    kind: PodSecurityPolicyScan
```

