## configmap.yaml

```yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: ollama-config
  namespace: ai-ops
  labels:
    app.kubernetes.io/name: ollama
    app.kubernetes.io/component: inference-server
data:
  # Runtime tuning
  OLLAMA_KEEP_ALIVE: "24h"
  OLLAMA_HOST: "0.0.0.0"
  OLLAMA_MAX_LOADED_MODELS: "1"
  OLLAMA_NUM_PARALLEL: "2"
  OLLAMA_MAX_QUEUE: "10"

  # Observability
  OLLAMA_DEBUG: "false"
  OLLAMA_ORIGINS: "https://ai-gateway.internal"

  # Disable telemetry to external endpoints
  OLLAMA_NOPRUNE: "false"

  # Model storage path (matches volumeMount)
  OLLAMA_MODELS: "/models"
