## limitrange.yaml

```yaml
# Enforces resource requests/limits on all pods in namespace
apiVersion: v1
kind: LimitRange
metadata:
  name: ai-ops-limits
  namespace: ai-ops
spec:
  limits:
    - type: Container
      default:
        cpu: "500m"
        memory: "512Mi"
      defaultRequest:
        cpu: "100m"
        memory: "256Mi"
      max:
        cpu: "8000m"
        memory: "12Gi"
      min:
        cpu: "50m"
        memory: "64Mi"
    - type: PersistentVolumeClaim
      max:
        storage: 100Gi
      min:
        storage: 1Gi
```

