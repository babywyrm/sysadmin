## rbac.yaml

```yaml
# Minimal ServiceAccount вЂ” no default token automount
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ollama-sa
  namespace: ai-ops
  labels:
    app.kubernetes.io/name: ollama
    app.kubernetes.io/component: inference-server
  annotations:
    # AWS IRSA вЂ” if running on EKS
    # eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT:role/ollama-irsa-role
    # GKE Workload Identity вЂ” if running on GKE
    # iam.gke.io/gcp-service-account: ollama@PROJECT.iam.gserviceaccount.com
automountServiceAccountToken: false
---
# Role: bare minimum for StatefulSet pod operations
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ollama-role
  namespace: ai-ops
rules:
  # Required for readiness/liveness probes via API
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  # Allow reading own configmap
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["ollama-config"]
    verbs: ["get", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ollama-rolebinding
  namespace: ai-ops
subjects:
  - kind: ServiceAccount
    name: ollama-sa
    namespace: ai-ops
roleRef:
  kind: Role
  apiRef: rbac.authorization.k8s.io
  name: ollama-role
```

