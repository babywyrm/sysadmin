## network-policy.yaml

```yaml
# Default deny-all ingress and egress for the namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: ai-ops
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
# Allow ollama to receive traffic ONLY from known clients
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ollama-allow-ingress
  namespace: ai-ops
spec:
  podSelector:
    matchLabels:
      app: ollama
  policyTypes:
    - Ingress
  ingress:
    # Allow from MCP server pods in same namespace
    - from:
        - podSelector:
            matchLabels:
              role: mcp-client
      ports:
        - protocol: TCP
          port: 11434
    # Allow from monitoring namespace (Prometheus scrape)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
        - podSelector:
            matchLabels:
              app: prometheus
      ports:
        - protocol: TCP
          port: 11434
---
# Allow ollama egress ONLY to model registry + DNS
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ollama-allow-egress
  namespace: ai-ops
spec:
  podSelector:
    matchLabels:
      app: ollama
  policyTypes:
    - Egress
  egress:
    # DNS resolution (CoreDNS)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
        - podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Model pull from internal registry only
    # Remove this block if models are pre-loaded
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: registry
      ports:
        - protocol: TCP
          port: 443
```

